<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudoclasse</title>
    <style>
        div{
            background-color: whitesmoke;
            width: 200px;
            height: 200px;
            border: 1px solid black;
            display: inline-block;
            text-align: center;
        }
        div:hover{
            background-color: blueviolet;
        }
        div > p{
            display: none;
        }
        div:hover > p{
            display: block;
        }
    </style>
</head>
<body>
    <div>
        01
        <P>CU</P>
    </div>
    <div>02</div>
    <div>03</div>
    <div>04</div>
</body>
</html>
